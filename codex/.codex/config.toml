# ~/.codex/config.toml

# ---- 基本設定 ----
# デフォルトで使うモデル
model = "gpt-5.5"

# 推論の深さ（medium: バランス型 / high: より時間をかける）
model_reasoning_effort = "xhigh"

# Web 検索の動作（"live" / "cached" / "disabled"）
web_search = "live"

# ---- 実行ポリシー ----
# コマンド実行時の確認ポリシー
# - "untrusted": コマンド実行前に基本的に確認する
# - "on-request": 必要なときだけ確認
# - "on-failure": 失敗時に確認
approval_policy = "on-request"

# サンドボックスレベル
# - "workspace-write": 作業ディレクトリ内は書き込みOK、外は制限
sandbox_mode = "workspace-write"

# ---- 通知 ----
# 通知の設定（$HOME 展開のため bash -lc 経由で実行）
notify = ["bash", "-lc", "$HOME/.codex/codex_message.sh \"$0\""]

# ---- 警告表示 ----
# 開発中機能の警告を抑制
suppress_unstable_features_warning = true

# ---- 出力トーン ----
personality = "pragmatic"

# ---- 信頼済みプロジェクト ----
# 現行形式: [projects."/absolute/path"] + trust_level = "trusted" | "untrusted"
# BEGIN managed-trust-projects
# trust add/rm で自動更新
[projects."/Users/yoshihiko/ghq/github.com/yoshihiko555/ai-orchestra"]
trust_level = "trusted"

[projects."/Users/yoshihiko/ghq/github.com/yoshihiko555/ai-valification"]
trust_level = "trusted"

[projects."/Users/yoshihiko/ghq/github.com/yoshihiko555/baton"]
trust_level = "trusted"

[projects."/Users/yoshihiko/ghq/github.com/yoshihiko555/digital-garden"]
trust_level = "trusted"

[projects."/Users/yoshihiko/ghq/github.com/yoshihiko555/dotfiles"]
trust_level = "trusted"

[projects."/Users/yoshihiko/ghq/github.com/yoshihiko555/google-apps-scripts"]
trust_level = "trusted"

[projects."/Users/yoshihiko/ghq/github.com/yoshihiko555/learno/dev"]
trust_level = "trusted"

[projects."/Users/yoshihiko/ghq/github.com/yoshihiko555/rag-experiment"]
trust_level = "trusted"

[projects."/Users/yoshihiko/ghq/github.com/yoshihiko555/tech-site"]
trust_level = "trusted"

# END managed-trust-projects

[features]
# apply_patch ベースの柔軟な編集ツール（ベータ）
apply_patch_freeform = true
# プランモードが使えるやつ
collaboration_modes = true
multi_agent = true
js_repl = false

[shell_environment_policy]
inherit = "core"
ignore_default_excludes = false
exclude = [
  "AWS_*",
  "AZURE_*",
  "GCP_*",
  "GOOGLE_*",
  "OPENAI_*",
  "ANTHROPIC_*",
  "GITHUB_*",
  "GH_*",
  "NPM_TOKEN",
  "HOMEBREW_GITHUB_API_TOKEN",
]
set = {}
include_only = []

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]
enabled = false
enabled_tools = ["resolve-library-id", "query-docs"]

[mcp_servers.notion]
command = "npx"
args = ["-y", "mcp-remote", "https://mcp.notion.com/mcp"]
enabled = false

[mcp_servers.pencil]
command = "/Applications/Pencil.app/Contents/Resources/app.asar.unpacked/out/mcp-server-darwin-arm64"
args = ["--app", "desktop"]

[mcp_servers.node_repl]
args = []
command = "/Applications/Codex.app/Contents/Resources/cua_node/bin/node_repl"
startup_timeout_sec = 120

[mcp_servers.node_repl.env]
NODE_REPL_NATIVE_PIPE_CONNECT_TIMEOUT_MS = "1000"
NODE_REPL_NODE_MODULE_DIRS = "/Applications/Codex.app/Contents/Resources/cua_node/lib/node_modules"
NODE_REPL_NODE_PATH = "/Applications/Codex.app/Contents/Resources/cua_node/bin/node"
NODE_REPL_TRUSTED_CODE_PATHS = "/Users/yoshihiko/.codex"
CODEX_HOME = "/Users/yoshihiko/.codex"
NODE_REPL_TRUSTED_BROWSER_CLIENT_SHA256S = "a3f3ca79fe2bff56076b895f1f13a8f673168160bd79d880cc34b4500e08a71c"
BROWSER_USE_AVAILABLE_BACKENDS = "chrome,iab"
NODE_REPL_INSTRUCTIONS_USE_CASE_BROWSER = "Control the in-app browser in conjunction with the Browser Plugin."
NODE_REPL_INSTRUCTIONS_USE_CASE_CHROME = "Control the Chrome browser in conjunction with the Chrome Plugin. Prefer this method of controlling Chrome over alternatives (such as Computer Use) unless the user explicitly mentions an alternative."
BROWSER_USE_CODEX_APP_BUILD_FLAVOR = "prod"
BROWSER_USE_CODEX_APP_VERSION = "26.609.30741"
CODEX_CLI_PATH = "/Applications/Codex.app/Contents/Resources/codex"

[notice]
hide_full_access_warning = true

[notice.model_migrations]
"gpt-5.1-codex-max" = "gpt-5.2-codex"
"gpt-5.2" = "gpt-5.2-codex"
"gpt-5.2-codex" = "gpt-5.3-codex"
"gpt-5.3-codex" = "gpt-5.4"
"gpt-5.4" = "gpt-5.5"

[tui]
status_line = ["model-name", "project-root", "git-branch", "context-remaining", "context-used", "five-hour-limit"]

[tui.model_availability_nux]
"gpt-5.5" = 4

