# ~/.codex/config.toml
# Codex CLI と ChatGPT デスクトップアプリで共有するグローバル設定。
# 「自動管理」と記載したブロックは、アプリや Codex CLI によって更新される。

# ---- 基本設定 ----
# デフォルトで使うモデル
model = "gpt-5.6-sol"

# 推論の深さ（medium: バランス型 / high: より時間をかける）
model_reasoning_effort = "xhigh"

# 出力トーン
personality = "pragmatic"

# Web 検索の動作（"live" / "cached" / "disabled"）
web_search = "live"

# ---- 実行ポリシー ----
# コマンド実行時の確認ポリシー
# - "untrusted": コマンド実行前に基本的に確認する
# - "on-request": 必要なときだけ確認
# - "on-failure": 失敗時に確認
approval_policy = "on-request"

# サンドボックスレベル
# - "workspace-write": 作業ディレクトリ内は書き込みOK、外は制限
sandbox_mode = "workspace-write"

# ---- 通知 ----
# 通知の設定（$HOME 展開のため bash -lc 経由で実行）
notify = ["/Users/yoshihiko/.codex/computer-use/Codex Computer Use.app/Contents/SharedSupport/SkyComputerUseClient.app/Contents/MacOS/SkyComputerUseClient", "turn-ended", "--previous-notify", "[\"bash\",\"-lc\",\"$HOME\\/.codex\\/codex_message.sh \\\"$0\\\"\"]"]

# ---- 信頼済みプロジェクト ----
# 現行形式: [projects."/absolute/path"] + trust_level = "trusted" | "untrusted"
# BEGIN managed-trust-projects
# trust add/rm で自動更新
[projects."/Users/yoshihiko/ghq/github.com/yoshihiko555/ai-orchestra"]
trust_level = "trusted"

[projects."/Users/yoshihiko/ghq/github.com/yoshihiko555/ai-valification"]
trust_level = "trusted"

[projects."/Users/yoshihiko/ghq/github.com/yoshihiko555/baton"]
trust_level = "trusted"

[projects."/Users/yoshihiko/ghq/github.com/yoshihiko555/digital-garden"]
trust_level = "trusted"

[projects."/Users/yoshihiko/ghq/github.com/yoshihiko555/dotfiles"]
trust_level = "trusted"

[projects."/Users/yoshihiko/ghq/github.com/yoshihiko555/google-apps-scripts"]
trust_level = "trusted"

[projects."/Users/yoshihiko/ghq/github.com/yoshihiko555/learno/dev"]
trust_level = "trusted"

[projects."/Users/yoshihiko/ghq/github.com/yoshihiko555/rag-experiment"]
trust_level = "trusted"

[projects."/Users/yoshihiko/ghq/github.com/yoshihiko555/tech-site"]
trust_level = "trusted"

[projects."/Users/yoshihiko/ghq/github.com/yoshihiko555/learno"]
trust_level = "trusted"

[projects."/private/tmp/claude-501/-Users-yoshihiko-ghq-github-com-yoshihiko555-ai-orchestra--worktrees-feat-loop/7d43b288-5755-4fc7-95c1-6fff6b2e1fca/scratchpad"]
trust_level = "trusted"

# END managed-trust-projects

# ---- 機能フラグ（手動管理） ----
[features]
# 安定機能だが、グローバルで常に有効にするため明示する
multi_agent = true

# ---- 子プロセスへ渡す環境変数 ----
[shell_environment_policy]
inherit = "core"
ignore_default_excludes = false
exclude = [
  "AWS_*",
  "AZURE_*",
  "GCP_*",
  "GOOGLE_*",
  "OPENAI_*",
  "ANTHROPIC_*",
  "GITHUB_*",
  "GH_*",
  "NPM_TOKEN",
  "HOMEBREW_GITHUB_API_TOKEN",
]

# ---- MCPサーバー（手動管理） ----
[mcp_servers.pencil]
command = "/Applications/Pencil.app/Contents/Resources/app.asar.unpacked/out/mcp-server-darwin-arm64"
args = ["--app", "desktop"]

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"

# ---- ChatGPTアプリ連携（自動管理） ----
# アプリ更新時にパス、バージョン、ハッシュが更新される。
[mcp_servers.node_repl]
args = []
command = "/Applications/ChatGPT.app/Contents/Resources/cua_node/bin/node_repl"
startup_timeout_sec = 120

[mcp_servers.node_repl.env]
NODE_REPL_NATIVE_PIPE_CONNECT_TIMEOUT_MS = "1000"
NODE_REPL_NODE_MODULE_DIRS = "/Applications/ChatGPT.app/Contents/Resources/cua_node/lib/node_modules"
NODE_REPL_NODE_PATH = "/Applications/ChatGPT.app/Contents/Resources/cua_node/bin/node"
NODE_REPL_TRUSTED_CODE_PATHS = "/Users/yoshihiko/.codex"
CODEX_HOME = "/Users/yoshihiko/.codex"
NODE_REPL_TRUSTED_BROWSER_CLIENT_SHA256S = "6d25aa7656feac858f3a3bdaea5bcbab0dbfd426c9de8e6931ce90c399ee8e4f,e74b67ab909392b37f7aef14977fce7aa80cfa02ade5491f30abcdbcb9e69f33"
BROWSER_USE_AVAILABLE_BACKENDS = "chrome,iab"
NODE_REPL_INSTRUCTIONS_USE_CASE_BROWSER = "Control the in-app browser in conjunction with the Browser Plugin."
NODE_REPL_INSTRUCTIONS_USE_CASE_CHROME = "Control the Chrome browser in conjunction with the Chrome Plugin. Prefer this method of controlling Chrome over alternatives (such as Computer Use) unless the user explicitly mentions an alternative."
NODE_REPL_INSTRUCTIONS_USE_CASE_COMPUTER_USE = "Control desktop apps on macOS through Computer Use."
BROWSER_USE_CODEX_APP_BUILD_FLAVOR = "prod"
BROWSER_USE_CODEX_APP_VERSION = "26.707.51957"
CODEX_CLI_PATH = "/Applications/ChatGPT.app/Contents/Resources/codex"

[mcp_servers.computer-use]
command = "./Codex Computer Use.app/Contents/SharedSupport/SkyComputerUseClient.app/Contents/MacOS/SkyComputerUseClient"
args = ["mcp"]
cwd = "."
enabled = true

# ---- 通知・モデル移行状態 ----
[notice]
hide_full_access_warning = true
hide_rate_limit_model_nudge = true

# Codexが更新するモデル移行通知の状態
[notice.model_migrations]
"gpt-5.1-codex-max" = "gpt-5.2-codex"
"gpt-5.2" = "gpt-5.2-codex"
"gpt-5.2-codex" = "gpt-5.3-codex"
"gpt-5.3-codex" = "gpt-5.4"
"gpt-5.4" = "gpt-5.5"

# ---- TUI ----
[tui]
notifications = ["approval-requested"]
notification_method = "bel"
notification_condition = "always"
status_line = ["model-name", "project-root", "git-branch", "context-remaining", "context-used", "five-hour-limit"]

# Codexが更新するモデル案内の表示状態
[tui.model_availability_nux]
"gpt-5.5" = 4
"gpt-5.6-sol" = 4

