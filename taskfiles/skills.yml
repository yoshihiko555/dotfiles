version: "3"

tasks:
  # ====================
  # Skills 同期
  # ====================
  sync-skills:
    desc: skills を追加・変更した後に Codex/Claude のスキルリンクを同期
    cmds:
      - |
        set -eu
        root="{{.ROOT_DIR}}"
        common="$root/shared/skills/common"
        codex_only="$root/shared/skills/codex-only"
        claude_only="$root/shared/skills/claude-only"
        codex_target="$root/codex/.codex/skills"
        claude_target="$root/claude/.claude/skills"

        mkdir -p "$codex_target" "$claude_target"

        cleanup_links() {
          target_dir="$1"
          rel_prefix="$2"
          if [ -d "$target_dir" ]; then
            find "$target_dir" -maxdepth 1 -type l -print | while read -r link; do
              link_target="$(readlink "$link")"
              case "$link_target" in
                "$rel_prefix"/*) rm -f "$link" ;;
              esac
            done
          fi
        }

        link_dir() {
          src_dir="$1"
          target_dir="$2"
          rel_prefix="$3"
          if [ -d "$src_dir" ]; then
            find "$src_dir" -mindepth 1 -maxdepth 1 \( -type d -o -type l \) -print | while read -r path; do
              name="$(basename "$path")"
              ln -snf "$rel_prefix/$name" "$target_dir/$name"
            done
          fi
        }

        cleanup_links "$codex_target" "../../../shared/skills/common"
        cleanup_links "$codex_target" "../../../shared/skills/codex-only"
        cleanup_links "$claude_target" "../../../shared/skills/common"
        cleanup_links "$claude_target" "../../../shared/skills/claude-only"

        link_dir "$common" "$codex_target" "../../../shared/skills/common"
        link_dir "$common" "$claude_target" "../../../shared/skills/common"
        link_dir "$codex_only" "$codex_target" "../../../shared/skills/codex-only"
        link_dir "$claude_only" "$claude_target" "../../../shared/skills/claude-only"

  sync-claude-work-skills:
    desc: 会社用 Claude Code に common + work のスキルを同期
    cmds:
      - |
        set -eu
        root="{{.ROOT_DIR}}"
        common="$root/shared/skills/common"
        work_skills="$root/shared/skills/work"
        work_config="${CLAUDE_WORK_CONFIG_DIR:-{{.HOME}}/.claude-work}"
        work_target="$work_config/skills"

        mkdir -p "$work_target"

        cleanup_absolute_links() {
          src_dir="$1"
          if [ -d "$work_target" ]; then
            find "$work_target" -maxdepth 1 -type l -print | while read -r link; do
              link_target="$(readlink "$link")"
              case "$link_target" in
                "$src_dir"/*) rm -f "$link" ;;
              esac
            done
          fi
        }

        link_absolute_dir() {
          src_dir="$1"
          if [ -d "$src_dir" ]; then
            find "$src_dir" -mindepth 1 -maxdepth 1 \( -type d -o -type l \) -print | while read -r path; do
              name="$(basename "$path")"
              ln -snf "$path" "$work_target/$name"
            done
          fi
        }

        cleanup_absolute_links "$common"
        cleanup_absolute_links "$work_skills"

        link_absolute_dir "$common"
        link_absolute_dir "$work_skills"

  claude-work-init:
    desc: Git 管理外の会社用 Claude Code 設定ディレクトリを初期化
    cmds:
      - |
        set -eu
        work_config="${CLAUDE_WORK_CONFIG_DIR:-{{.HOME}}/.claude-work}"
        mkdir -p "$work_config" "$work_config/skills"
        echo "会社用 Claude config: $work_config"
      - task: sync-claude-work-skills
