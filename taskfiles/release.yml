version: "3"

vars:
  # main ブランチ名（プロジェクトによって異なる場合に上書き可）
  MAIN_BRANCH: '{{.MAIN_BRANCH | default "main"}}'

tasks:
  release:
    desc: "リリースを作成（task release VERSION=v0.1.0 または task release BUMP=minor）"
    vars:
      LATEST_TAG:
        sh: git describe --tags --abbrev=0 2>/dev/null || echo ""
      NEXT_VERSION:
        sh: |
          if [ -n "{{.VERSION}}" ]; then
            echo "{{.VERSION}}"
          elif [ -n "{{.BUMP}}" ]; then
            latest="{{.LATEST_TAG}}"
            if [ -z "$latest" ]; then
              case "{{.BUMP}}" in
                major) echo "v1.0.0" ;;
                minor) echo "v0.1.0" ;;
                patch) echo "v0.0.1" ;;
              esac
            else
              v="${latest#v}"
              IFS='.' read -r major minor patch <<< "$v"
              case "{{.BUMP}}" in
                major) echo "v$((major+1)).0.0" ;;
                minor) echo "v${major}.$((minor+1)).0" ;;
                patch) echo "v${major}.${minor}.$((patch+1))" ;;
              esac
            fi
          else
            echo ""
          fi
    preconditions:
      - sh: command -v gh
        msg: "gh CLI が必要です: brew install gh"
      - sh: gh auth status 2>&1 | grep -q "Logged in"
        msg: "gh auth login でログインしてください"
      - sh: '[ -n "{{.NEXT_VERSION}}" ]'
        msg: "VERSION または BUMP を指定してください（例: task release VERSION=v0.1.0 / task release BUMP=minor）"
      - sh: 'echo "{{.NEXT_VERSION}}" | grep -qE "^v[0-9]+\.[0-9]+\.[0-9]+$"'
        msg: "バージョン形式が不正です。vX.Y.Z 形式で指定してください（例: v0.1.0）"
      - sh: 'git tag -l "{{.NEXT_VERSION}}" | grep -q . && exit 1 || exit 0'
        msg: "タグ {{.NEXT_VERSION}} は既に存在します"
    cmds:
      - task: release:preflight
      - task: release:sync-main
      - task: release:create
        vars:
          TAG: "{{.NEXT_VERSION}}"

  release:preflight:
    desc: リリース前チェック
    internal: true
    cmds:
      - cmd: echo "==> プロジェクト種別を検出中..."
        silent: true
      - cmd: |
          if [ -f pyproject.toml ]; then echo "  Python (pyproject.toml)"
          elif [ -f setup.py ]; then echo "  Python (setup.py)"
          elif [ -f package.json ]; then echo "  Node.js (package.json)"
          elif [ -f go.mod ]; then echo "  Go (go.mod)"
          elif [ -f Cargo.toml ]; then echo "  Rust (Cargo.toml)"
          else echo "  汎用（言語固有のビルドなし）"
          fi
        silent: true
      - cmd: echo "==> ブランチ・ワークツリーを確認中..."
        silent: true
      - cmd: |
          current=$(git branch --show-current)
          if [ "$current" != "{{.MAIN_BRANCH}}" ]; then
            echo "  ⚠ 現在 $current ブランチです。{{.MAIN_BRANCH}} に切り替えます。"
          else
            echo "  ✓ {{.MAIN_BRANCH}} ブランチです"
          fi
        silent: true
      - cmd: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "  ⚠ 未コミットの変更があります:"
            git status --short
            echo ""
            echo "  リリースを続行するには先にコミットまたはスタッシュしてください。"
            exit 1
          else
            echo "  ✓ ワークツリーはクリーンです"
          fi
        silent: true
      - cmd: echo "==> CI ステータスを確認中..."
        silent: true
      - cmd: |
          if gh run list --branch {{.MAIN_BRANCH}} --limit 1 --json conclusion -q '.[0].conclusion' 2>/dev/null | grep -q "success"; then
            echo "  ✓ 最新の CI はパスしています"
          else
            echo "  ⚠ CI の結果を確認できないか、失敗しています。続行しますか？"
          fi
        silent: true

  release:sync-main:
    desc: main ブランチを最新に同期
    internal: true
    cmds:
      - git checkout {{.MAIN_BRANCH}}
      - git pull origin {{.MAIN_BRANCH}}

  release:create:
    desc: タグとリリースを作成
    internal: true
    cmds:
      - cmd: echo "==> {{.TAG}} でリリースを作成します..."
        silent: true
      - gh release create {{.TAG}} --generate-notes
      - cmd: echo "==> ✓ リリース完了！"
        silent: true
      - cmd: gh release view {{.TAG}} --web 2>/dev/null || true
        silent: true

  release:status:
    desc: リリース関連の状態を表示（最新タグ、未リリースコミット数）
    cmds:
      - cmd: |
          echo "==> リリース状態"
          latest=$(git describe --tags --abbrev=0 2>/dev/null || echo "(タグなし)")
          echo "  最新タグ: $latest"

          if [ "$latest" != "(タグなし)" ]; then
            count=$(git rev-list ${latest}..{{.MAIN_BRANCH}} --count 2>/dev/null || echo "?")
            echo "  未リリースコミット: ${count}"
            if [ "$count" != "0" ] && [ "$count" != "?" ]; then
              echo ""
              echo "  未リリースの変更:"
              git log ${latest}..{{.MAIN_BRANCH}} --oneline --no-decorate | head -20
            fi
          fi
        silent: true

  release:list:
    desc: 過去のリリース一覧を表示
    cmds:
      - gh release list --limit 10
