# ====================
# ステータスバー（Tokyo Night Moon）
# ====================

# ステータスバーを上部に表示
set -g status-position top

# 更新間隔（秒）
set -g status-interval 1

# ステータスバー全体（WezTerm 同様に透過背景）
set -g status-style "bg=default,fg=#c8d3f5"
set -g status-justify left

# ステータスバー左側（モードバッジ + セッション一覧）
set -g status-left-length 160
set -g status-left '#{?pane_in_mode,#[fg=#1e2030#,bg=#ffc777#,bold]  COPY  ,#{?#{==:#{client_key_table},pane_mode},#[fg=#1e2030#,bg=#c3e88d#,bold]  PANE  ,#{?#{==:#{client_key_table},resize_mode},#[fg=#1e2030#,bg=#82aaff#,bold]  RESIZE  ,}}}#[default]#(~/.config/tmux/bin/tmux-session-tabs)'

# ステータスバー右側（process | project と日時）
set -g status-right-length 70
set -g status-right '#[fg=#c8d3f5,bg=#394270]  #{pane_current_command}#{?#{!=:#{b:pane_current_path},},  |  #{b:pane_current_path},}  #[fg=#1e2030,bg=#82aaff,bold]  %m/%d %H:%M  '

# ウィンドウ一覧は非表示（セッション一覧で代替）
set -g window-status-separator ""
setw -g window-status-format ""
setw -g window-status-current-format ""
setw -g window-status-activity-style "fg=#c8d3f5,bg=#007A8A"
setw -g window-status-bell-style "fg=#1e2030,bg=#ffc777,bold"
