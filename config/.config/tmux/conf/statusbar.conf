# ====================
# ステータスバー（Tokyo Night Moon）
# WezTerm 構成準拠: 左=モードバッジ / 中央=ウィンドウ一覧 / 右=セッション名+日時
# Powerline グリフは tmux-apply-statusbar スクリプトで run-shell 経由で設定
# ====================

# ステータスバーを上部に表示
set -g status-position top

# 更新間隔（秒）
set -g status-interval 1

# ステータスバー全体（透過背景）
set -g status-style "bg=default,fg=#c8d3f5"
set -g status-justify left

# 左側（モードバッジのみ、スクリプト不要で即時更新）
set -g status-left-length 40
set -g status-left '#{?pane_in_mode,#[fg=#1e2030#,bg=#ffc777#,bold]  COPY  #[default] ,#{?#{==:#{client_key_table},pane_mode},#[fg=#1e2030#,bg=#c3e88d#,bold]  PANE  #[default] ,#{?#{==:#{client_key_table},resize_mode},#[fg=#1e2030#,bg=#82aaff#,bold]  RESIZE  #[default] ,#{?client_prefix,#[fg=#c8d3f5#,bg=#3654a7#,bold]  PREFIX  #[default] ,}}}}'

# ウィンドウ一覧（tmux ネイティブ、即時更新）
# Powerline グリフは tmux-apply-statusbar で上書きされる
set -g window-status-separator " "
setw -g window-status-format "#[fg=#c8d3f5,bg=#005461]  #W  "
setw -g window-status-current-format "#[fg=#c8d3f5,bg=#3BC1A8,bold]  #W  "
setw -g window-status-activity-style "fg=#c8d3f5,bg=#007A8A"
setw -g window-status-bell-style "fg=#1e2030,bg=#ffc777,bold"

# 右側（セッション名 + 日時、Powerline 矢印付き）
set -g status-right-length 120
set -g status-right '#(~/.config/tmux/bin/tmux-status-right)'

# Powerline グリフを window-status-format に適用
run-shell '~/.config/tmux/bin/tmux-apply-statusbar'
