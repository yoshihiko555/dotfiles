# ====================
# コピーモード
# ====================

bind [ copy-mode
bind V display-popup -E -w 95% -h 95% "~/.config/tmux/bin/tmux-open-pane-snapshot '#{pane_id}'"

# ドラッグで選択開始（tmux 3.6 ではデフォルトで存在しないため明示的に追加）
bind -T root MouseDrag1Pane if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" "send-keys -M" "copy-mode -M"
bind -T copy-mode-vi MouseDrag1Pane select-pane \; send-keys -X begin-selection

# ドラッグ終了時: コピーのみ（コピーモードは維持、スクロール位置も維持）
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection
