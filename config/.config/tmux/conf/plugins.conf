# ====================
# TPM プラグイン
# ====================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'Morantron/tmux-fingers'
set -g @plugin 'tmux-plugins/tmux-open'

# tmux-fingers: 画面内のテキスト (URL, UUID, パス等) を QuickSelect 風に選択
set -g @fingers-key F
set -g @fingers-pattern-0 '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}'
set -g @fingers-pattern-1 '[0-9a-f]{12,64}'
set -g @fingers-pattern-2 '@[a-zA-Z0-9-]+/[a-zA-Z0-9._-]+'

# tmux-open: コピーモードで選択したテキストを開く
# o → ブラウザで開く, Ctrl+o → エディタで開く, S → Google 検索
set -g @open-S 'https://www.google.com/search?q='

# TPM 自動インストール + 初期化
# 初回起動時に TPM がなければ clone、プラグイン未インストールなら自動インストール
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm'"
if "test ! -d ~/.tmux/plugins/tmux-fingers" \
   "run '~/.tmux/plugins/tpm/bin/install_plugins'"
run '~/.tmux/plugins/tpm/tpm'
