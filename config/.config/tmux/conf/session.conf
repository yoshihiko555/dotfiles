# ====================
# Alt+1..9 セッション切替（Prefix 不要）
# Cmd+1..9 → WezTerm が Alt+1..9 に変換 → tmux でセッション切替
# ====================
bind -n M-1 run-shell "~/.config/tmux/bin/tmux-switch-session 1"
bind -n M-2 run-shell "~/.config/tmux/bin/tmux-switch-session 2"
bind -n M-3 run-shell "~/.config/tmux/bin/tmux-switch-session 3"
bind -n M-4 run-shell "~/.config/tmux/bin/tmux-switch-session 4"
bind -n M-5 run-shell "~/.config/tmux/bin/tmux-switch-session 5"
bind -n M-6 run-shell "~/.config/tmux/bin/tmux-switch-session 6"
bind -n M-7 run-shell "~/.config/tmux/bin/tmux-switch-session 7"
bind -n M-8 run-shell "~/.config/tmux/bin/tmux-switch-session 8"
bind -n M-9 run-shell "~/.config/tmux/bin/tmux-switch-session 9"
