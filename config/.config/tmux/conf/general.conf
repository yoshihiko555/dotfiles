# ====================
# 基本設定（Neovim の操作感に必要）
# ====================

# デフォルトシェルを zsh に
set -g default-shell /bin/zsh

# True Color 透過
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Undercurl 透過（LSP 警告/エラー下線）
set -ag terminal-overrides ",*:Smulx=\E[4::%p1%dm"
set -ag terminal-overrides ",*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m"

# Escape 遅延の除去（デフォルト 500ms → Neovim が使い物にならない）
set -sg escape-time 0

# クリップボード（OSC52 パススルー: Neovim のヤンクがシステムクリップボードへ）
set -g set-clipboard on

# フォーカスイベント透過（Neovim の FocusGained/FocusLost が動作）
set -g focus-events on

# ターミナルクエリのパススルー（yazi 等がターミナル能力を検出するために必要）
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# マウスサポート
set -g mouse on

# コピーモードを vi キーバインドに（Neovim ユーザー向け）
set -g mode-keys vi

# ヒストリ上限
set -g history-limit 50000

# ウィンドウ番号を 1 から開始
set -g base-index 1

# ペイン番号を 1 から開始
setw -g pane-base-index 1

# ウィンドウを閉じたとき番号を詰める
set -g renumber-windows on

# ウィンドウ名を自動でカレントディレクトリ名にする
set -g automatic-rename on
set -g automatic-rename-format '#{?#{m/r:^(lazygit|lg|htop|btop|top|lazydocker|k9s|ncdu|dust|ranger|lf|yazi)$,#{pane_current_command}},#{pane_current_command},#{b:pane_current_path}}'
set -g allow-rename off
