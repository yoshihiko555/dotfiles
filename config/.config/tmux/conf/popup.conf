# ====================
# display-popup（フローティング）
# ====================

# lazygit（.zshrc の関数経由で XDG_CONFIG_HOME を設定）
bind g display-popup -E -w 80% -h 80% "zsh -ic 'lazygit'"

# 一時シェル（現在のパスで起動）
bind t display-popup -E -d "#{pane_current_path}" -w 80% -h 80%

# Claude Code
bind C display-popup -E -w 90% -h 90% "claude"

# AI Orchestra サブエージェント履歴（フローティング）
bind a display-popup -E -w 90% -h 90% "~/.config/tmux/bin/tmux-popup-claude-history"

# サブエージェント監視ペイン（トグル: 表示 / 非表示、概要表示）
bind A run-shell "~/.config/tmux/bin/tmux-toggle-claude"

# プロジェクト picker（GHQ + worktree → セッション作成/切替）
# display-popup 内の switch-client は popup クライアントに適用されるため、
# 一時ファイル経由で popup 終了後に親クライアントで切り替える
bind f display-popup -E -w 80% -h 70% "~/.config/tmux/bin/tmux-sessionizer" \; \
  if-shell "test -f /tmp/tmux-sessionizer-target" \
    "run-shell 'tmux switch-client -t \"$(cat /tmp/tmux-sessionizer-target)\" ; rm -f /tmp/tmux-sessionizer-target'"

# セッション一覧から切替（WezTerm の Leader+w 相当）
bind w display-popup -E -w 60% -h 60% \
  "tmux ls -F '#{session_name}' | grep -v '^claude-' | /opt/homebrew/bin/fzf > /tmp/tmux-switch-target && tmux switch-client -t \"$(cat /tmp/tmux-switch-target)\""

# セッション削除
bind W display-popup -E -w 60% -h 50% "~/.config/tmux/bin/tmux-kill-session"

# baton: default セッション常駐に切替
bind b switch-client -t default
# baton: ポップアップで一時確認（ジャンプ後に終了）
bind B display-popup -E -w 90% -h 90% "~/.local/bin/baton --exit"

# チートシート表示（fzf で選択 → glow でレンダリング）
bind ? display-popup -E -w 90% -h 90% "~/.config/tmux/bin/tmux-cheatsheet"
