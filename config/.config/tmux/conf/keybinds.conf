# ====================
# Prefix キー（Ctrl+Q）
# WezTerm の Leader 廃止に伴い Ctrl+T → Ctrl+Q に変更
# ====================
set -g prefix C-q
unbind C-b
bind C-q send-prefix

# ====================
# キーバインド
# ====================

# ペイン分割
bind r split-window -h -c "#{pane_current_path}"   # 横分割
bind d split-window -v -c "#{pane_current_path}"   # 縦分割

# ペイン閉じ
bind x kill-pane

# セッション閉じ（実行中プロセスがあれば確認）
bind X run-shell "~/.config/tmux/bin/tmux-kill-current-session"

# ペインズーム
bind z run-shell "~/.config/tmux/bin/tmux-save-pane-snapshot '#{pane_id}'" \; resize-pane -Z
bind -n M-\; resize-pane -Z

# 新しいウィンドウ
bind c new-window -c "#{pane_current_path}"

# ウィンドウ切替（p はペインモードに使用するため P に割当）
bind n next-window
bind P previous-window

# ペイン移動（Prefix + vim キー）
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ペインレイアウト分割 (Prefix+2~8: 現在ウィンドウを N ペインに分割)
bind 2 run-shell "~/.config/tmux/bin/tmux-split-layout 2 #{pane_id}"
bind 3 run-shell "~/.config/tmux/bin/tmux-split-layout 3 #{pane_id}"
bind 4 run-shell "~/.config/tmux/bin/tmux-split-layout 4 #{pane_id}"
bind 5 run-shell "~/.config/tmux/bin/tmux-split-layout 5 #{pane_id}"
bind 6 run-shell "~/.config/tmux/bin/tmux-split-layout 6 #{pane_id}"
bind 7 run-shell "~/.config/tmux/bin/tmux-split-layout 7 #{pane_id}"
bind 8 run-shell "~/.config/tmux/bin/tmux-split-layout 8 #{pane_id}"

# ペイン初期化 (Prefix+0: ペイン数に応じてプロセス起動)
bind 0 run-shell "~/.config/tmux/bin/tmux-init-panes"

# 設定ファイルの再読み込み
bind R source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"
