# ====================
# Prefix キー（Ctrl+Q）
# ====================
set -g prefix C-q
unbind C-b
bind C-q send-prefix

# ====================
# キーバインド
# ====================

# ペイン分割
bind r split-window -h -c "#{pane_current_path}"   # 横分割
bind d split-window -v -c "#{pane_current_path}"   # 縦分割

# ペイン閉じ
bind x kill-pane

# ペインズーム
bind z run-shell "~/.config/tmux/bin/tmux-save-pane-snapshot '#{pane_id}'" \; resize-pane -Z

# 新しいウィンドウ
bind c new-window -c "#{pane_current_path}"

# ウィンドウ切替（p はペインモードに使用するため P に割当）
bind n next-window
bind P previous-window

# ペイン移動（Prefix + vim キー）
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# 設定ファイルの再読み込み
bind R source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"
