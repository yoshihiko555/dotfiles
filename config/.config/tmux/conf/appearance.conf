# ====================
# 見た目（Tokyo Night Moon）
# ====================

# ペインの境界線（WezTerm の split 色に合わせた明るめの線）
set -g pane-border-style "fg=#c0c8e0"
set -g pane-active-border-style "fg=#c0c8e0"

# 非アクティブペインを暗くしてアクティブペインを際立たせる
set -g window-style "fg=#828bb8,bg=default"
set -g window-active-style "fg=#c8d3f5,bg=default"

# コピーモードの選択ハイライト
set -g mode-style "bg=#3654a7,fg=#c8d3f5,bold"

# メッセージ表示
set -g message-style "bg=#005461,fg=#c8d3f5"
