# ====================
# リサイズモード（Prefix + e で入る。Escape/Enter/q で抜ける）
# ====================
bind e switch-client -T resize_mode
bind -T resize_mode h resize-pane -L 5 \; switch-client -T resize_mode
bind -T resize_mode j resize-pane -D 5 \; switch-client -T resize_mode
bind -T resize_mode k resize-pane -U 5 \; switch-client -T resize_mode
bind -T resize_mode l resize-pane -R 5 \; switch-client -T resize_mode
bind -T resize_mode H resize-pane -L 1 \; switch-client -T resize_mode
bind -T resize_mode J resize-pane -D 1 \; switch-client -T resize_mode
bind -T resize_mode K resize-pane -U 1 \; switch-client -T resize_mode
bind -T resize_mode L resize-pane -R 1 \; switch-client -T resize_mode
bind -T resize_mode Escape switch-client -T root
bind -T resize_mode Enter switch-client -T root
bind -T resize_mode q switch-client -T root

# ====================
# ペインモード（Prefix + p で入る。Escape/Enter/q で抜ける）
# ====================
bind p switch-client -T pane_mode
bind -T pane_mode h select-pane -L \; switch-client -T pane_mode
bind -T pane_mode j select-pane -D \; switch-client -T pane_mode
bind -T pane_mode k select-pane -U \; switch-client -T pane_mode
bind -T pane_mode l select-pane -R \; switch-client -T pane_mode
bind -T pane_mode r split-window -h -c "#{pane_current_path}" \; switch-client -T pane_mode
bind -T pane_mode d split-window -v -c "#{pane_current_path}" \; switch-client -T pane_mode
bind -T pane_mode x kill-pane \; switch-client -T pane_mode
bind -T pane_mode z run-shell "~/.config/tmux/bin/tmux-save-pane-snapshot '#{pane_id}'" \; resize-pane -Z
bind -T pane_mode 1 select-pane -t 1 \; switch-client -T pane_mode
bind -T pane_mode 2 select-pane -t 2 \; switch-client -T pane_mode
bind -T pane_mode 3 select-pane -t 3 \; switch-client -T pane_mode
bind -T pane_mode 4 select-pane -t 4 \; switch-client -T pane_mode
bind -T pane_mode 5 select-pane -t 5 \; switch-client -T pane_mode
bind -T pane_mode e switch-client -T resize_mode
bind -T pane_mode Escape switch-client -T root
bind -T pane_mode Enter switch-client -T root
bind -T pane_mode q switch-client -T root
